<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secure Chatroom Pro</title>
    <style>
        :root { 
            --bg: #0b141a; --panel: #202c33; --accent: #38bdf8; --text: #e9edef;
            --my-gradient: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            --their-gradient: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        }

        body.light-mode { 
            --bg: #efeae2; --panel: #ffffff; --accent: #0284c7; --text: #111b21;
            --my-gradient: linear-gradient(135deg, #d9fdd3 0%, #c1eeb0 100%);
            --their-gradient: linear-gradient(135deg, #ffffff 0%, #f0f2f5 100%);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', Helvetica, sans-serif; 
            background: var(--bg); color: var(--text); height: 100dvh; /* Uses Dynamic Viewport Height for Mobile */
            display: flex; flex-direction: column; overflow: hidden; transition: 0.3s;
        }

        /* SMALLER CENTERED HEADER */
        header { 
            background: var(--panel); padding: 12px; text-align: center; 
            border-bottom: 2px solid var(--accent); flex-shrink: 0;
        }
        header h1 { margin: 0; font-size: 1.3rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

        /* FLOATING THEME TOGGLE - Always accessible */
        .theme-btn { 
            position: fixed; right: 15px; top: 10px; cursor: pointer; z-index: 100;
            font-size: 1.2rem; background: var(--panel); border: 1px solid var(--accent); 
            border-radius: 50%; width: 35px; height: 35px; color: var(--accent);
            display: flex; align-items: center; justify-content: center;
        }

        #messages { 
            list-style-type: none; margin: 0; padding: 15px; flex-grow: 1; 
            overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }

        #messages li { 
            padding: 10px 14px; border-radius: 15px; max-width: 85%; 
            position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            font-size: 0.95rem;
        }

        .sent { align-self: flex-end; background: var(--my-gradient); border-bottom-right-radius: 2px; color: white; }
        .light-mode .sent { color: #111b21; }
        .received { align-self: flex-start; background: var(--their-gradient); border-bottom-left-radius: 2px; }

        .timestamp-area { font-size: 0.65rem; opacity: 0.7; margin-top: 5px; display: flex; justify-content: flex-end; align-items: center; gap: 4px; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        audio { margin-top: 8px; max-width: 100%; height: 35px; }

        /* FIXED INPUT BOX - Fully visible */
        #form { 
            background: var(--panel); padding: 10px 15px; display: flex; gap: 10px; 
            align-items: center; border-top: 1px solid rgba(0,0,0,0.1); flex-shrink: 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* Fix for iPhone notches */
        }
        
        .icon-stack { display: flex; flex-direction: column; gap: 4px; }
        
        #input { 
            flex-grow: 1; border: 1px solid rgba(120,120,120,0.3); padding: 10px 15px; 
            border-radius: 20px; background: var(--bg); color: var(--text); outline: none; font-size: 16px; /* 16px prevents iOS auto-zoom */
        }

        .send-btn { 
            background: var(--accent); color: #0b141a; border: none; 
            width: 40px; height: 40px; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .send-btn svg { width: 18px; height: 18px; fill: currentColor; transform: rotate(45deg); margin-left: -2px; }

        .icon-btn { cursor: pointer; font-size: 1.2rem; color: var(--accent); }
        #file-input { display: none; }
        .recording { color: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        @media (min-width: 768px) {
            #messages { padding: 20px 20%; }
            #messages li { max-width: 65%; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle Theme">🌓</button>
    <header><h1>Secure Private Chatroom of A squared!</h1></header>

    <ul id="messages"></ul>

    <form id="form">
        <div class="icon-stack">
            <label for="file-input" class="icon-btn" title="Send Image">📎</label>
            <span id="mic-btn" class="icon-btn" title="Record Voice">🎤</span>
        </div>
        <input type="file" id="file-input" accept="image/*">
        <input id="input" autocomplete="off" placeholder="Message..." />
        <button type="submit" class="send-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var myName = prompt("Enter Name:") || "User";
        let mediaRecorder, audioChunks = [];

        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if (input.value) {
                socket.emit('chat message', { name: myName, msg: input.value, type: 'text' });
                input.value = '';
            }
        });

        document.getElementById('file-input').addEventListener('change', function(e) {
            var reader = new FileReader();
            reader.onload = ev => socket.emit('chat message', { name: myName, msg: ev.target.result, type: 'image' });
            reader.readAsDataURL(e.target.files[0]);
        });

        const micBtn = document.getElementById('mic-btn');
        micBtn.addEventListener('touchstart', startRec); // Better for mobile
        micBtn.addEventListener('mousedown', startRec);

        async function startRec(e) {
            e.preventDefault();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = ev => audioChunks.push(ev.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.onload = res => socket.emit('chat message', { name: myName, msg: res.target.result, type: 'audio' });
                    reader.readAsDataURL(audioBlob);
                };
                mediaRecorder.start(); micBtn.classList.add('recording');
            } catch(err) { alert("Mic error: " + err.message); }
        }

        window.addEventListener('mouseup', stopRec);
        window.addEventListener('touchend', stopRec);
        function stopRec() { if (mediaRecorder?.state === "recording") { mediaRecorder.stop(); micBtn.classList.remove('recording'); } }

        socket.on('chat message', function(data) {
            var item = document.createElement('li');
            item.className = (data.name === myName) ? 'sent' : 'received';
            let content = data.msg;
            if (data.type === 'image') content = `<img class="chat-img" src="${data.msg}">`;
            if (data.type === 'audio') content = `<audio controls src="${data.msg}"></audio>`;

            item.innerHTML = `
                <div style="font-weight:bold; font-size:0.7rem; margin-bottom:2px; opacity:0.8;">${data.name}</div>
                <div>${content}</div>
                <div class="timestamp-area">
                    <span>${data.time}</span>
                    <span id="read-${data.id}"></span>
                </div>
            `;
            document.getElementById('messages').appendChild(item);
            const mList = document.getElementById('messages');
            mList.scrollTop = mList.scrollHeight;
            if (data.name !== myName) socket.emit('message read', { msgId: data.id, reader: myName });
        });

        socket.on('update read status', function(data) {
            var el = document.getElementById('read-' + data.msgId);
            if (el) el.innerHTML = `✓ <small style="font-size:0.5rem">Seen by ${data.reader}</small>`;
        });

        socket.on('clear chat', function() { document.getElementById('messages').innerHTML = ''; });
    </script>
</body>
</html>
