<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Chat</title>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #151921;
            --accent: #e94560;
            --text: #ffffff;
            --secondary: #94a3b8;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; 
        }

        header { background: var(--panel); padding: 15px; text-align: center; border-bottom: 1px solid #2d3748; font-weight: bold; color: var(--accent); letter-spacing: 1px; }

        #messages { 
            list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; 
            overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
        }

        #messages li { 
            padding: 12px 16px; background: var(--panel); border-radius: 12px; 
            max-width: 80%; align-self: flex-start; border-left: 4px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease;
        }

        .user-name { display: block; font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }

        #form { background: var(--panel); padding: 20px; display: flex; gap: 10px; border-top: 1px solid #2d3748; }
        
        #input { 
            flex-grow: 1; border: none; padding: 12px 18px; border-radius: 25px; 
            background: #1e2530; color: white; outline: none; font-size: 1rem;
        }

        button { 
            background: var(--accent); color: white; border: none; padding: 0 25px; 
            border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }

        button:hover { background: #ff4d6d; transform: scale(1.05); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <header>● PRIVATE ENCRYPTED CHAT</header>
    <ul id="messages"></ul>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="Write a message..." /><button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      var socket = io();
      var form = document.getElementById('form');
      var input = document.getElementById('input');
      
      // Step 1: Ask for the user's name immediately
      var myName = prompt("Enter your display name:") || "Guest";

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (input.value) {
          // Step 2: Send both the name and the text
          socket.emit('chat message', { name: myName, text: input.value });
          input.value = '';
        }
      });

      socket.on('chat message', function(data) {
        var item = document.createElement('li');
        // Step 3: Display the name in a small label above the message
        item.innerHTML = `<span class="user-name">${data.name}</span>${data.text}`;
        document.getElementById('messages').appendChild(item);
        document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
      });
    </script>
</body>
</html>
