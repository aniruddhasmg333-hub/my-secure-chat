<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Chat Pro</title>
    <style>
        :root { 
            --bg: #0b141a; --panel: #202c33; --accent: #00a884; 
            --sent: #005c4b; --received: #202c33; --text: #e9edef; 
        }
        body.light-mode { 
            --bg: #efeae2; --panel: #f0f2f5; --accent: #008069; 
            --sent: #dcf8c6; --received: #ffffff; --text: #111b21; 
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }

        header { background: var(--panel); padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        header h1 { margin: 0; font-size: 1.8rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; }
        .theme-toggle { position: absolute; right: 20px; top: 25px; cursor: pointer; font-size: 1.2rem; background: none; border: none; color: #38bdf8; }

        #messages { list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

        /* --- WHATSAPP BUBBLE LOGIC --- */
        #messages li { 
            padding: 8px 12px; border-radius: 8px; max-width: 75%; 
            position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
            word-wrap: break-word; font-size: 0.95rem;
        }

        /* Messages sent by ME */
        .sent { align-self: flex-end; background: var(--sent); color: var(--text); border-bottom-right-radius: 2px !important; }

        /* Messages sent by OTHERS */
        .received { align-self: flex-start; background: var(--received); color: var(--text); border-bottom-left-radius: 2px !important; }

        .message-header { display: flex; flex-direction: column; margin-bottom: 4px; }
        .user-name { font-weight: bold; font-size: 0.75rem; color: #38bdf8; }
        .timestamp { font-size: 0.65rem; opacity: 0.6; align-self: flex-end; margin-top: 4px; }
        
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        audio { margin-top: 8px; max-width: 200px; height: 35px; }

        #form { background: var(--panel); padding: 10px 15px; display: flex; gap: 12px; align-items: center; }
        .icon-stack { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        #input { flex-grow: 1; border: none; padding: 12px 18px; border-radius: 25px; background: var(--bg); color: var(--text); outline: none; }
        
        #file-input { display: none; }
        .icon-btn { cursor: pointer; font-size: 1.4rem; color: #8696a0; transition: 0.2s; }
        .send-btn { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .recording { color: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <header>
        <h1>Secure Chat</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <ul id="messages"></ul>

    <form id="form">
        <div class="icon-stack">
            <label for="file-input" class="icon-btn">📎</label>
            <span id="mic-btn" class="icon-btn">🎤</span>
        </div>
        <input type="file" id="file-input" accept="image/*">
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button class="send-btn">Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var myName = prompt("Enter your name:") || "Guest";
        let mediaRecorder;
        let audioChunks = [];

        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if (input.value) {
                socket.emit('chat message', { name: myName, msg: input.value, type: 'text' });
                input.value = '';
            }
        });

        document.getElementById('file-input').addEventListener('change', function(e) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                socket.emit('chat message', { name: myName, msg: ev.target.result, type: 'image' });
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // Voice Recording Logic
        const micBtn = document.getElementById('mic-btn');
        micBtn.addEventListener('mousedown', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.onload = ev => socket.emit('chat message', { name: myName, msg: ev.target.result, type: 'audio' });
                    reader.readAsDataURL(audioBlob);
                };
                mediaRecorder.start();
                micBtn.classList.add('recording');
            } catch(err) { console.log(err); }
        });

        window.addEventListener('mouseup', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                micBtn.classList.remove('recording');
            }
        });

        // Receiving Messages
        socket.on('chat message', function(data) {
            var item = document.createElement('li');
            
            // KEY STEP: Add "sent" class if it's me, "received" if it's someone else
            item.classList.add(data.name === myName ? 'sent' : 'received');

            let content = data.msg;
            if (data.type === 'image') content = `<img class="chat-img" src="${data.msg}">`;
            if (data.type === 'audio') content = `<audio controls src="${data.msg}"></audio>`;

            item.innerHTML = `
                <div class="message-header">
                    ${data.name !== myName ? `<span class="user-name">${data.name}</span>` : ''}
                </div>
                <div class="message-body">${content}</div>
                <div class="timestamp">${data.time}</div>
                <div style="font-size:0.6rem; color:#38bdf8; text-align:right;" id="read-${data.id}"></div>
            `;
            
            document.getElementById('messages').appendChild(item);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
            if (data.name !== myName) socket.emit('message read', { msgId: data.id, reader: myName });
        });

        socket.on('update read status', function(data) {
            var el = document.getElementById('read-' + data.msgId);
            if (el) el.innerText = "✓ Seen";
        });

        socket.on('clear chat', function() { document.getElementById('messages').innerHTML = ''; });
    </script>
</body>
</html>
