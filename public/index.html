<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat with Read Receipts</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--panel); padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); color: var(--accent); font-weight: bold; }
        #messages { list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        #messages li { padding: 12px; background: var(--panel); border-radius: 12px; max-width: 75%; align-self: flex-start; border-left: 3px solid var(--accent); position: relative; }
        .meta { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 5px; opacity: 0.7; }
        .read-status { font-size: 0.65rem; color: #10b981; margin-top: 5px; display: block; font-style: italic; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        #form { background: var(--panel); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        #input { flex-grow: 1; border: none; padding: 12px; border-radius: 20px; background: #0f172a; color: white; outline: none; }
        #file-input { display: none; }
        .clip-btn { cursor: pointer; font-size: 1.5rem; color: var(--accent); }
        button { background: var(--accent); color: #0f172a; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>🔒 ENCRYPTED PRIVATE CHAT</header>
    <ul id="messages"></ul>
    <form id="form">
        <label for="file-input" class="clip-btn">📎</label>
        <input type="file" id="file-input" accept="image/*">
        <input id="input" autocomplete="off" placeholder="Message..." /><button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var myName = prompt("Your Name:") || "Guest";

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if (input.value) {
                socket.emit('chat message', { name: myName, msg: input.value, type: 'text' });
                input.value = '';
            }
        });

        document.getElementById('file-input').addEventListener('change', function(e) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                socket.emit('chat message', { name: myName, msg: ev.target.result, type: 'image' });
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        socket.on('chat message', function(data) {
            var item = document.createElement('li');
            item.id = "msg-" + data.id;
            var content = data.type === 'image' ? `<img class="chat-img" src="${data.msg}">` : data.msg;
            item.innerHTML = `<div class="meta"><span>${data.name}</span><span>${data.time}</span></div>
                              ${content}
                              <span class="read-status" id="read-${data.id}"></span>`;
            document.getElementById('messages').appendChild(item);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
            
            // Tell server YOU read this message (if it's not yours)
            if (data.name !== myName) {
                socket.emit('message read', { msgId: data.id, reader: myName });
            }
        });

        socket.on('update read status', function(data) {
            var statusEl = document.getElementById('read-' + data.msgId);
            if (statusEl && !statusEl.innerText.includes(data.reader)) {
                statusEl.innerText = "Seen by " + data.reader;
            }
        });
    </script>
</body>
</html>
