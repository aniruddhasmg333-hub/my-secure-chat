<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Media Chat</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body.light-mode { --bg: #f1f5f9; --panel: #ffffff; --accent: #0284c7; --text: #1e293b; }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }

        /* BIG BOLD CENTERED HEADER */
        header { 
            background: var(--panel); padding: 30px 15px; text-align: center; 
            border-bottom: 4px solid var(--accent); position: relative;
        }
        header h1 { 
            margin: 0; font-size: 2.8rem; color: #38bdf8; text-transform: uppercase; 
            letter-spacing: 5px; font-weight: 900; 
        }

        .theme-toggle { position: absolute; right: 15px; top: 15px; cursor: pointer; font-size: 1.2rem; background: none; border: none; color: var(--accent); }

        #messages { list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        #messages li { padding: 12px; background: var(--panel); border-radius: 12px; max-width: 80%; align-self: flex-start; border-left: 4px solid var(--accent); }
        
        .message-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
        .user-name { font-weight: bold; font-size: 0.85rem; color: var(--accent); }
        .timestamp { font-size: 0.7rem; opacity: 0.6; }
        
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        audio { margin-top: 8px; max-width: 100%; height: 35px; }

        #form { background: var(--panel); padding: 15px; display: flex; gap: 15px; align-items: center; border-top: 1px solid rgba(0,0,0,0.1); }
        
        /* STACKED ICONS CONTAINER */
        .icon-stack { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        
        #input { flex-grow: 1; border: none; padding: 15px 20px; border-radius: 25px; background: var(--bg); color: var(--text); outline: none; border: 1px solid var(--accent); }
        
        #file-input { display: none; }
        .icon-btn { cursor: pointer; font-size: 1.5rem; color: var(--accent); line-height: 1; transition: 0.2s; }
        .icon-btn:hover { transform: scale(1.1); }
        
        .send-btn { background: var(--accent); color: #0f172a; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .recording { color: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <header>
        <h1>Secure Chat</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <ul id="messages"></ul>

    <form id="form">
        <div class="icon-stack">
            <label for="file-input" class="icon-btn">📎</label>
            <span id="mic-btn" class="icon-btn">🎤</span>
        </div>
        
        <input type="file" id="file-input" accept="image/*">
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button class="send-btn">Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var myName = prompt("Your Name:") || "Guest";
        let mediaRecorder;
        let audioChunks = [];

        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        // Send Text
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if (input.value) {
                socket.emit('chat message', { name: myName, msg: input.value, type: 'text' });
                input.value = '';
            }
        });

        // Send Image
        document.getElementById('file-input').addEventListener('change', function(e) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                socket.emit('chat message', { name: myName, msg: ev.target.result, type: 'image' });
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // Voice Recording (Hold to Record)
        const micBtn = document.getElementById('mic-btn');
        micBtn.addEventListener('mousedown', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.onload = ev => socket.emit('chat message', { name: myName, msg: ev.target.result, type: 'audio' });
                    reader.readAsDataURL(audioBlob);
                };
                mediaRecorder.start();
                micBtn.classList.add('recording');
            } catch(err) { alert("Microphone access denied."); }
        });

        window.addEventListener('mouseup', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                micBtn.classList.remove('recording');
            }
        });

        // Display Messages
        socket.on('chat message', function(data) {
            var item = document.createElement('li');
            let content = data.msg;
            if (data.type === 'image') content = `<img class="chat-img" src="${data.msg}">`;
            if (data.type === 'audio') content = `<audio controls src="${data.msg}"></audio>`;

            item.innerHTML = `
                <div class="message-header">
                    <span class="user-name">${data.name}</span>
                    <span class="timestamp">${data.time}</span>
                </div>
                <div>${content}</div>
                <div style="font-size:0.6rem; color:#10b981; margin-top:4px;" id="read-${data.id}"></div>
            `;
            document.getElementById('messages').appendChild(item);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
            if (data.name !== myName) socket.emit('message read', { msgId: data.id, reader: myName });
        });

        socket.on('update read status', function(data) {
            var el = document.getElementById('read-' + data.msgId);
            if (el) el.innerText = "✓ Seen by " + data.reader;
        });

        socket.on('clear chat', function() { document.getElementById('messages').innerHTML = ''; });
    </script>
</body>
</html>
