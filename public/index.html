<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat - Live Time</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--panel); padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); color: var(--accent); font-weight: bold; }
        
        #messages { list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        #messages li { padding: 12px; background: var(--panel); border-radius: 12px; max-width: 80%; align-self: flex-start; border-left: 3px solid var(--accent); }
        
        /* This styles the Name and Time header */
        .message-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 5px; }
        .user-name { font-weight: bold; font-size: 0.85rem; color: var(--accent); }
        .timestamp { font-size: 0.7rem; color: #94a3b8; }
        
        .read-status { font-size: 0.6rem; color: #10b981; margin-top: 4px; display: block; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        
        #form { background: var(--panel); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        #input { flex-grow: 1; border: none; padding: 12px; border-radius: 20px; background: #0f172a; color: white; outline: none; }
        #file-input { display: none; }
        .clip-btn { cursor: pointer; font-size: 1.5rem; color: var(--accent); }
        button { background: var(--accent); color: #0f172a; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>🔒 SECURE SESSION</header>
    <ul id="messages"></ul>
    <form id="form">
        <label for="file-input" class="clip-btn">📎</label>
        <input type="file" id="file-input" accept="image/*">
        <input id="input" autocomplete="off" placeholder="Message..." /><button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var myName = prompt("Enter your name:") || "Guest";

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if (input.value) {
                socket.emit('chat message', { name: myName, msg: input.value, type: 'text' });
                input.value = '';
            }
        });

        document.getElementById('file-input').addEventListener('change', function(e) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                socket.emit('chat message', { name: myName, msg: ev.target.result, type: 'image' });
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        socket.on('chat message', function(data) {
            var item = document.createElement('li');
            var content = data.type === 'image' ? `<img class="chat-img" src="${data.msg}">` : data.msg;
            
            // This builds the message with the Username and the EXACT Time
            item.innerHTML = `
                <div class="message-header">
                    <span class="user-name">${data.name}</span>
                    <span class="timestamp">${data.time}</span>
                </div>
                <div class="message-body">${content}</div>
                <span class="read-status" id="read-${data.id}"></span>
            `;
            
            document.getElementById('messages').appendChild(item);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
            
            if (data.name !== myName) {
                socket.emit('message read', { msgId: data.id, reader: myName });
            }
        });

        socket.on('update read status', function(data) {
            var statusEl = document.getElementById('read-' + data.msgId);
            if (statusEl) statusEl.innerText = "✓ Seen by " + data.reader;
        });
    </script>
</body>
</html>
